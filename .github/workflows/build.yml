name: Build UniStore

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🧪 Validar apps.json
      run: |
        sudo apt-get update
        sudo apt-get install -y jq
        jq . apps.json > /dev/null

    - name: 📂 Checar estrutura
      run: |
        echo "Checking files..."
        test -f apps.json || (echo "apps.json não encontrado!" && exit 1)

    - name: 🚀 Deploy para GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
